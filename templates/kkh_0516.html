<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서버연습 1</title>
</head>
<body>
    <h1>강현이가 만든 첫 서버</h1>
    <input type="number" id="num">
    <button onclick="sendData()">DB저장</button>
    <p id="result"></p>

    <script>
        async function sendData(){
            const val = document.getElementById('num').value;
            const resultText = document.getElementById('result');

            const response = await fetch('https://laziness-chapped-laziness.ngrok-free.dev/su/jin',{
                method: 'POST',
                headers: { 'Content-Type': 'application/json'},
                body: JSON.stringify({ inputNumber: val})
        });

        const result = await response.json()
        resultText.innerText= result.message;
        }
    </script>
    
</body>
</html>
